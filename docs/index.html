<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="斛兵来信">
<meta name="theme-color" content="#005BAC">
<link rel="manifest" href="manifest.json">
<title>斛兵来信</title>
<style>
:root {
  --primary: #005BAC; --primary-light: #0078D4;
  --brand-gradient: linear-gradient(135deg, #003D7A 0%, #005BAC 40%, #0078D4 100%);
  --comp: #E8550C; --comp-light: #FFF3EB;
  --holiday: #1B7A4A; --holiday-light: #EDF7F2;
  --bg: #F2F3F7; --card: #FFFFFF; --text: #1A1C1E; --text2: #5F6368; --text3: #9AA0A6;
  --border: #E8EAED; --shadow-sm: 0 1px 2px rgba(0,0,0,.04); --shadow-md: 0 2px 12px rgba(0,0,0,.06); --shadow-lg: 0 8px 24px rgba(0,0,0,.08);
  --radius-sm: 12px; --radius: 18px; --radius-lg: 24px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F1115; --card: #1B1E24; --text: #E8EAED; --text2: #9AA0A6; --text3: #5F6368;
    --border: #2D3138; --shadow-sm: 0 1px 2px rgba(0,0,0,.2); --shadow-md: 0 2px 12px rgba(0,0,0,.3); --shadow-lg: 0 8px 24px rgba(0,0,0,.4);
    --brand-gradient: linear-gradient(135deg, #001D3D 0%, #003166 40%, #003D7A 100%);
    --comp-light: #2A1A10; --holiday-light: #162820;
  }
}

* { margin:0; padding:0; box-sizing:border-box }
html { scroll-behavior:smooth; -webkit-tap-highlight-color:transparent }
body { font-family:var(--font); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; overflow-x:hidden; min-height:100vh; padding-bottom:calc(72px + var(--safe-bottom)); transition:background .3s,color .3s }
a { color:var(--primary); text-decoration:none }

/* ===== Hero Header ===== */
.hero { position:relative; background:var(--brand-gradient); padding:16px 16px 32px; padding-top:calc(16px + env(safe-area-inset-top, 0px)); overflow:hidden }
.hero::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:24px; background:var(--bg); border-radius:24px 24px 0 0 }
.hero-top { display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1 }
.hero-brand { display:flex; align-items:center; gap:10px }
.hero-logo { width:44px; height:44px; background:rgba(255,255,255,.18); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.15) }
.hero-title { color:#fff; font-size:20px; font-weight:700; letter-spacing:.3px; line-height:1.2 }
.hero-sub { color:rgba(255,255,255,.65); font-size:12px; font-weight:400; margin-top:1px }
.hero-actions { display:flex; gap:6px; position:relative; z-index:1 }
.hero-btn { width:36px; height:36px; border-radius:50%; background:rgba(255,255,255,.15); backdrop-filter:blur(8px); border:1px solid rgba(255,255,255,.12); color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s }
.hero-btn:active { transform:scale(.92); background:rgba(255,255,255,.25) }

/* ===== Glass Stats ===== */
.stats-row { display:flex; gap:10px; margin-top:16px; position:relative; z-index:2 }
.stat-item { flex:1; background:rgba(255,255,255,.12); backdrop-filter:blur(12px); border-radius:var(--radius-sm); padding:14px 10px; text-align:center; border:1px solid rgba(255,255,255,.1); transition:transform .15s }
.stat-item:active { transform:scale(.96) }
.stat-num { font-size:28px; font-weight:800; color:#fff; letter-spacing:-1px; line-height:1 }
.stat-num.comp { color:#FFB088 }
.stat-num.holiday { color:#8FE0B8 }
.stat-date { font-size:13px; color:#fff; font-weight:600; margin-top:2px }
.stat-label { font-size:10px; color:rgba(255,255,255,.6); margin-top:2px; font-weight:500 }

/* ===== Section header ===== */
.section { padding:0 16px; margin-top:20px }
.section-title { font-size:12px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px }

/* ===== Pill Tabs ===== */
.pills-wrap { overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding:0 16px }
.pills-wrap::-webkit-scrollbar { display:none }
.pills { display:inline-flex; gap:8px; padding:4px 0 }
.pill { padding:7px 16px; border-radius:20px; font-size:13px; font-weight:500; border:none; cursor:pointer; background:var(--card); color:var(--text2); box-shadow:var(--shadow-sm); transition:all .2s cubic-bezier(.4,0,.2,1); white-space:nowrap; display:inline-flex; align-items:center; gap:4px }
.pill:active { transform:scale(.94) }
.pill.on-comp { background:var(--comp); color:#fff; box-shadow:0 4px 12px rgba(232,85,12,.3); transform:scale(1.02) }
.pill.on-holiday { background:var(--holiday); color:#fff; box-shadow:0 4px 12px rgba(27,122,74,.3); transform:scale(1.02) }

/* ===== Date Group ===== */
.date-header { display:flex; align-items:center; gap:8px; padding:16px 16px 8px }
.date-dot { width:8px; height:8px; border-radius:50%; background:var(--primary) }
.date-label { font-size:13px; font-weight:600; color:var(--text); letter-spacing:.2px }

/* ===== Cards ===== */
.feed { padding:0 16px }
.card { background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:10px; box-shadow:var(--shadow-md); cursor:pointer; transition:all .2s cubic-bezier(.4,0,.2,1); position:relative; overflow:hidden; border:1px solid var(--border) }
.card:active { transform:scale(.975); box-shadow:var(--shadow-sm) }
.card.comp { border-left:3px solid var(--comp) }
.card.holiday { border-left:3px solid var(--holiday) }
.card-head { display:flex; align-items:flex-start; gap:10px; padding-right:20px }
.card-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; margin-top:1px }
.card-icon.comp-bg { background:var(--comp-light) }
.card-icon.holiday-bg { background:var(--holiday-light) }
.card-title { font-size:14px; font-weight:600; line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; color:var(--text) }
.card-meta { display:flex; align-items:center; gap:8px; margin-top:10px; flex-wrap:wrap }
.card-date { font-size:11px; color:var(--text3); font-weight:500 }
.card-tag { display:inline-block; padding:3px 8px; border-radius:8px; font-size:10px; font-weight:600; letter-spacing:.3px }
.card-tag.comp-tag { background:var(--comp-light); color:var(--comp) }
.card-tag.holiday-tag { background:var(--holiday-light); color:var(--holiday) }
.card-source { font-size:10px; color:var(--text3) }
.card-chevron { position:absolute; right:14px; top:50%; transform:translateY(-50%); width:20px; height:20px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:10px; color:var(--text3); transition:transform .25s }
.card.expanded .card-chevron { transform:translateY(-50%) rotate(90deg); background:var(--primary); color:#fff }
.card-summary { display:none; font-size:12px; color:var(--text2); line-height:1.6; margin-top:10px; padding-top:10px; border-top:1px solid var(--border) }
.card.expanded .card-summary { display:block }
.card-detail { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border) }
.card.expanded .card-detail { display:block }
.detail-row { margin-bottom:6px; font-size:12px; color:var(--text2) }
.detail-row .dl { color:var(--text3); margin-right:4px; font-size:11px }
.card-link { display:inline-flex; align-items:center; gap:4px; margin-top:8px; padding:8px 16px; background:var(--primary); color:#fff; border-radius:20px; font-size:12px; font-weight:600; text-decoration:none; transition:all .15s }
.card-link:active { opacity:.8; transform:scale(.96) }

/* ===== Pull to refresh ===== */
.pull-bar { text-align:center; overflow:hidden; max-height:0; transition:max-height .3s }
.pull-bar.active { max-height:48px; padding:12px }
.pull-spin { display:inline-block; width:20px; height:20px; border:2px solid #ddd; border-top-color:var(--primary); border-radius:50%; animation:spin .7s linear infinite }
@keyframes spin { to { transform:rotate(360deg) } }

/* ===== Bottom Nav ===== */
.tab-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); display:flex; z-index:100; padding:0 16px; padding-bottom:var(--safe-bottom); box-shadow:0 -2px 12px rgba(0,0,0,.04) }
.tab-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 6px; border:none; background:none; cursor:pointer; color:var(--text3); transition:all .2s; position:relative }
.tab-item .tb-icon { font-size:21px; transition:transform .2s }
.tab-item .tb-label { font-size:10px; font-weight:500; margin-top:2px }
.tab-item.active { color:var(--primary) }
.tab-item.active .tb-icon { transform:translateY(-1px) }
.tab-item.active::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:24px; height:3px; background:var(--primary); border-radius:0 0 3px 3px }

/* ===== Search Overlay ===== */
.search-overlay { display:none; position:fixed; inset:0; background:var(--bg); z-index:300; padding:16px; padding-top:calc(16px + env(safe-area-inset-top, 0px)) }
.search-overlay.show { display:block; animation:fadeIn .2s }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }
.search-bar { display:flex; align-items:center; gap:8px; background:var(--card); border-radius:var(--radius); padding:8px 14px; box-shadow:var(--shadow-md); border:2px solid var(--primary); transition:all .2s }
.search-bar input { flex:1; border:none; background:transparent; font-size:15px; color:var(--text); outline:none; font-family:var(--font) }
.search-bar .cancel { background:none; border:none; font-size:14px; font-weight:600; color:var(--primary); cursor:pointer; white-space:nowrap; padding:6px 4px }
.search-empty { text-align:center; padding:48px 16px; color:var(--text3) }
.search-empty .se-icon { font-size:44px; margin-bottom:10px; display:block }

/* ===== Empty state ===== */
.empty { text-align:center; padding:48px 16px; color:var(--text3) }
.empty .em-icon { font-size:48px; margin-bottom:10px; display:block }
.empty .em-text { font-size:14px; font-weight:500 }

/* ===== About ===== */
.about-page { display:none; padding:20px 16px }
.about-page.show { display:block; animation:fadeIn .25s }
.about-card { background:var(--card); border-radius:var(--radius-lg); padding:28px 20px; text-align:center; box-shadow:var(--shadow-md); border:1px solid var(--border) }
.about-card .alogo { font-size:56px; margin-bottom:12px }
.about-card h2 { font-size:20px; font-weight:700; margin-bottom:4px }
.about-card .aver { font-size:12px; color:var(--text3); margin-bottom:18px }
.about-card p { font-size:13px; color:var(--text2); line-height:2 }
.dark-btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:24px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-size:13px; font-weight:500; cursor:pointer; margin-top:14px; transition:all .15s }
.dark-btn:active { transform:scale(.95) }

/* ===== Toast ===== */
.toast { position:fixed; top:60px; left:50%; transform:translateX(-50%); background:#1F1F1F; color:#fff; padding:10px 20px; border-radius:24px; font-size:12px; font-weight:600; z-index:400; opacity:0; transition:opacity .3s; pointer-events:none; box-shadow:0 8px 24px rgba(0,0,0,.2) }
.toast.show { opacity:1 }

/* ===== iOS safe area patches ===== */
@supports(padding:max(0px)){
  .hero { padding-top:max(16px,env(safe-area-inset-top)) }
  body { padding-bottom:max(72px,calc(72px + env(safe-area-inset-bottom))) }
  .tab-bar { padding-bottom:max(0px,env(safe-area-inset-bottom)) }
}
</style>
</head>
<body>

<!-- Hero -->
<div class="hero">
  <div class="hero-top">
    <div class="hero-brand">
      <div class="hero-logo">📬</div>
      <div>
        <div class="hero-title">斛兵来信</div>
        <div class="hero-sub">合工大通知 · 实时更新</div>
      </div>
    </div>
    <div class="hero-actions">
      <button class="hero-btn" onclick="refreshData()" aria-label="刷新">🔄</button>
      <button class="hero-btn" onclick="toggleSearch()" aria-label="搜索">🔍</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-item" onclick="switchTab('competition','')">
      <div class="stat-num comp" id="compCount">-</div>
      <div class="stat-label">🏆 竞赛通知</div>
    </div>
    <div class="stat-item" onclick="switchTab('holiday','')">
      <div class="stat-num holiday" id="holidayCount">-</div>
      <div class="stat-label">📅 节假日通知</div>
    </div>
    <div class="stat-item">
      <div class="stat-date" id="updateDay">--</div>
      <div class="stat-label">📆 更新日期</div>
    </div>
  </div>
</div>

<!-- Pull to refresh -->
<div class="pull-bar" id="pullBar"><div class="pull-spin"></div></div>

<!-- Category pills -->
<div class="pills-wrap" id="pillsArea">
  <div class="pills" id="pillsInner"></div>
</div>

<!-- Feed -->
<div id="feedArea">
  <div class="feed" id="noticeList"></div>
</div>

<!-- About -->
<div class="about-page" id="aboutPage">
  <div class="about-card">
    <div class="alogo">📬</div>
    <h2>斛兵来信</h2>
    <div class="aver">v2.0 · 瑞幸风格 · 合工大通知监控</div>
    <p>
      🏫 合肥工业大学新闻网<br>
      🏆 竞赛 · 节假日自动推送<br>
      📱 PushPlus 微信实时通知<br>
      深色模式 · 子分类 · 周报
    </p>
    <p style="margin-top:8px">
      <a href="https://news.hfut.edu.cn/tzgg2.htm" target="_blank">🔗 访问官网</a>
    </p>
    <button class="dark-btn" onclick="toggleDarkMode()">
      <span id="darkIcon">🌙</span> <span id="darkLabel">深色模式</span>
    </button>
  </div>
</div>

<!-- Bottom tab bar -->
<div class="tab-bar">
  <button class="tab-item active" id="nav0" onclick="showPage('home')">
    <span class="tb-icon">🏠</span><span class="tb-label">首页</span>
  </button>
  <button class="tab-item" id="nav1" onclick="switchTab('competition','');showPage('home')">
    <span class="tb-icon">🏆</span><span class="tb-label">竞赛</span>
  </button>
  <button class="tab-item" id="nav2" onclick="switchTab('holiday','');showPage('home')">
    <span class="tb-icon">📅</span><span class="tb-label">节假</span>
  </button>
  <button class="tab-item" id="nav3" onclick="showPage('about')">
    <span class="tb-icon">⚙</span><span class="tb-label">关于</span>
  </button>
</div>

<!-- Search overlay -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="搜索标题、标签…" oninput="doSearch()" autocomplete="off">
    <button class="cancel" onclick="toggleSearch()">取消</button>
  </div>
  <div class="feed" id="searchResults" style="margin-top:14px"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== State =====
let allNotices = [], currentTab = 'competition', currentSub = '', currentPage = 'home';
let darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

// ===== Dark mode =====
function applyDark() {
  const keys = {
    '--bg': darkMode ? '#0F1115' : '#F2F3F7',
    '--card': darkMode ? '#1B1E24' : '#FFFFFF',
    '--text': darkMode ? '#E8EAED' : '#1A1C1E',
    '--text2': darkMode ? '#9AA0A6' : '#5F6368',
    '--text3': darkMode ? '#5F6368' : '#9AA0A6',
    '--border': darkMode ? '#2D3138' : '#E8EAED',
    '--brand-gradient': darkMode ? 'linear-gradient(135deg, #001D3D 0%, #003166 40%, #003D7A 100%)' : 'linear-gradient(135deg, #003D7A 0%, #005BAC 40%, #0078D4 100%)',
    '--comp-light': darkMode ? '#2A1A10' : '#FFF3EB',
    '--holiday-light': darkMode ? '#162820' : '#EDF7F2',
  };
  Object.entries(keys).forEach(([k,v]) => document.documentElement.style.setProperty(k, v));
  document.getElementById('darkIcon').textContent = darkMode ? '☀️' : '🌙';
  document.getElementById('darkLabel').textContent = darkMode ? '浅色模式' : '深色模式';
}
function toggleDarkMode() { darkMode = !darkMode; applyDark(); haptic(); }
applyDark();

// ===== Data =====
async function loadData() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    allNotices = (d.notices || []).filter(n => n.category === 'competition' || n.category === 'holiday');
    allNotices.sort((a,b) => b.date.localeCompare(a.date));
  } catch(e) {
    allNotices = sampleData();
  }
  render();
}

function sampleData() {
  return [
    {title:"关于举办2026新域新质创新大赛校内选拔赛的通知",date:"2026-07-21",link:"#",category:"competition",sub_label:"学科竞赛",source_tab:"教学科研"},
    {title:"关于举办第二届全球校友创新创业大赛的通知",date:"2026-07-21",link:"#",category:"competition",sub_label:"创新创业",source_tab:"教学科研"},
    {title:"关于组织参加第十五届挑战杯创业计划竞赛的通知",date:"2026-07-13",link:"#",category:"competition",sub_label:"学科竞赛",source_tab:"其他通知"},
    {title:"关于2026年清明节放假安排的通知",date:"2026-04-01",link:"#",category:"holiday",sub_label:"放假通知",source_tab:"其他通知"},
  ];
}

async function refreshData() {
  document.getElementById('pullBar').classList.add('active'); haptic('medium');
  await loadData();
  setTimeout(() => { document.getElementById('pullBar').classList.remove('active'); showToast('已刷新'); }, 600);
}

// ===== Render =====
const SUB_EMOJI = {'学科竞赛':'🏅','创新创业':'💡','课题申报':'📋','讲座报告':'🎙️','放假通知':'🎉','假期安排':'📆','开学返校':'🏫'};

function render() {
  // Filter
  let filtered = allNotices.filter(n => n.category === currentTab);
  if (currentSub) filtered = filtered.filter(n => (n.sub_label||'') === currentSub);
  filtered.sort((a,b) => b.date.localeCompare(a.date));

  // Stats
  document.getElementById('compCount').textContent = allNotices.filter(n => n.category === 'competition').length;
  document.getElementById('holidayCount').textContent = allNotices.filter(n => n.category === 'holiday').length;
  const dates = allNotices.map(n => n.date).sort().reverse();
  document.getElementById('updateDay').textContent = dates[0] ? dates[0].slice(5) : '--';

  // Pills
  renderPills();

  // Cards
  const groups = dateGroups(filtered);
  let html = '';
  if (filtered.length === 0) {
    html = '<div class="empty"><span class="em-icon">📭</span><div class="em-text">暂无通知</div></div>';
  } else {
    for (const [label, items] of Object.entries(groups)) {
      html += '<div class="date-header"><div class="date-dot"></div><div class="date-label">' + label + ' (' + items.length + ')</div></div>';
      for (const n of items) {
        const sub = n.sub_label || '';
        const cardCls = n.category === 'competition' ? 'comp' : 'holiday';
        const iconBg = n.category === 'competition' ? 'comp-bg' : 'holiday-bg';
        const tagCls = n.category === 'competition' ? 'comp-tag' : 'holiday-tag';
        const emoji = n.category === 'competition' ? '🏆' : '📅';
        const summary = n.summary || '';
        html += '<div class="card ' + cardCls + '" onclick="toggleCard(this)">' +
          '<div class="card-head">' +
            '<div class="card-icon ' + iconBg + '">' + emoji + '</div>' +
            '<div class="card-title">' + esc(n.title) + '</div>' +
          '</div>' +
          '<div class="card-meta">' +
            '<span class="card-date">📆 ' + n.date + '</span>' +
            (sub ? '<span class="card-tag ' + tagCls + '">' + (SUB_EMOJI[sub]||'') + ' ' + sub + '</span>' : '') +
            '<span class="card-source">' + esc(n.source_tab||'') + '</span>' +
          '</div>' +
          (summary ? '<div class="card-summary">📝 ' + esc(summary).substring(0, 100) + '</div>' : '') +
          '<div class="card-chevron">▶</div>' +
          '<div class="card-detail">' +
            '<div class="detail-row"><span class="dl">📝</span>' + esc(n.title) + '</div>' +
            '<div class="detail-row"><span class="dl">📅</span>' + n.date + '</div>' +
            (sub ? '<div class="detail-row"><span class="dl">🏷️</span>' + sub + '</div>' : '') +
            (summary ? '<div class="detail-row"><span class="dl">📄</span>' + esc(summary).substring(0, 200) + '</div>' : '') +
            '<a href="' + esc(n.link) + '" target="_blank" class="card-link" onclick="event.stopPropagation()">查看官网原文 →</a>' +
          '</div>' +
        '</div>';
      }
    }
  }
  document.getElementById('noticeList').innerHTML = html;
}

function renderPills() {
  const compSubs = ['', '学科竞赛', '创新创业', '课题申报', '讲座报告'];
  const holSubs = ['', '放假通知', '假期安排', '开学返校'];
  const subs = currentTab === 'competition' ? compSubs : holSubs;
  const onCls = currentTab === 'competition' ? 'on-comp' : 'on-holiday';
  let html = '';
  for (const s of subs) {
    const label = s || (currentTab === 'competition' ? '全部竞赛' : '全部节假日');
    const emoji = SUB_EMOJI[s] || (currentTab === 'competition' ? '🏆' : '📅');
    const active = s === currentSub;
    html += '<button class="pill ' + (active ? onCls : '') + '" onclick="switchTab(\'' + currentTab + '\',\'' + s + '\')">' + emoji + ' ' + label + '</button>';
  }
  document.getElementById('pillsInner').innerHTML = html;
}

function dateGroups(notices) {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const yesterday = new Date(now - 864e5).toISOString().slice(0,10);
  const weekAgo = new Date(now - 7*864e5).toISOString().slice(0,10);
  const monthAgo = new Date(now - 30*864e5).toISOString().slice(0,10);
  const groups = {};
  for (const n of notices) {
    let k;
    if (n.date === today) k = '今天';
    else if (n.date === yesterday) k = '昨天';
    else if (n.date > weekAgo) k = '本周';
    else if (n.date > monthAgo) k = '本月';
    else k = '更早';
    if (!groups[k]) groups[k] = [];
    groups[k].push(n);
  }
  return groups;
}

// ===== Tab & Page =====
function switchTab(cat, sub) {
  currentTab = cat; currentSub = sub;
  render(); showPage('home'); haptic();
}

function toggleCard(card) { card.classList.toggle('expanded'); haptic(); }

function showPage(page) {
  currentPage = page;
  const home = page === 'home';
  document.getElementById('pillsArea').style.display = home ? '' : 'none';
  document.getElementById('feedArea').style.display = home ? '' : 'none';
  document.getElementById('aboutPage').classList.toggle('show', page === 'about');
  ['nav0','nav1','nav2','nav3'].forEach((id,i) => {
    const act = (page==='home'&&i===0) || (page==='about'&&i===3) ||
               (page==='home'&&i===1&&currentTab==='competition') ||
               (page==='home'&&i===2&&currentTab==='holiday');
    document.getElementById(id).classList.toggle('active', act);
  });
  if (!home && currentPage === 'home') {
    document.getElementById('nav0').classList.add('active');
  }
}

// ===== Search =====
function toggleSearch() {
  const ov = document.getElementById('searchOverlay');
  const show = ov.classList.toggle('show');
  if (show) {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
    setTimeout(() => document.getElementById('searchInput').focus(), 150);
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const el = document.getElementById('searchResults');
  if (!q) { el.innerHTML = ''; return; }
  const matched = allNotices.filter(n =>
    n.title.toLowerCase().includes(q) || (n.sub_label||'').includes(q) ||
    (n.source_tab||'').toLowerCase().includes(q) || (n.summary||'').toLowerCase().includes(q)
  );
  if (!matched.length) {
    el.innerHTML = '<div class="search-empty"><span class="se-icon">🔍</span>未找到"' + esc(q) + '"</div>';
    return;
  }
  el.innerHTML = matched.map(n => {
    const sub = n.sub_label || '';
    const cls = n.category === 'competition' ? 'comp' : 'holiday';
    const ibg = n.category === 'competition' ? 'comp-bg' : 'holiday-bg';
    const tcls = n.category === 'competition' ? 'comp-tag' : 'holiday-tag';
    const emoji = n.category === 'competition' ? '🏆' : '📅';
    return '<div class="card ' + cls + '" onclick="this.classList.toggle(\'expanded\')">' +
      '<div class="card-head"><div class="card-icon ' + ibg + '">' + emoji + '</div><div class="card-title">' + esc(n.title) + '</div></div>' +
      '<div class="card-meta"><span class="card-date">📆 ' + n.date + '</span>' + (sub?'<span class="card-tag ' + tcls + '">' + sub + '</span>':'') + '<span class="card-source">' + esc(n.source_tab||'') + '</span></div>' +
      '<div class="card-chevron">▶</div>' +
      '<div class="card-detail"><div class="detail-row"><span class="dl">📝</span>' + esc(n.title) + '</div><div class="detail-row"><span class="dl">📅</span>' + n.date + '</div>' + (n.summary?'<div class="detail-row"><span class="dl">📄</span>' + esc(n.summary).substring(0,200) + '</div>':'') + '<a href="' + esc(n.link) + '" target="_blank" class="card-link" onclick="event.stopPropagation()">查看原文 →</a></div>' +
    '</div>';
  }).join('');
}

// ===== Utils =====
function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function haptic(s) { try { navigator.vibrate(s==='medium'?15:6); } catch(e) {} }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1800); }

// ===== PWA =====
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// ===== Launch =====
loadData(); showPage('home');
</script>
