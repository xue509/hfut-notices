<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="斛兵来信">
<meta name="theme-color" content="#005BAC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>斛兵来信 - 合工大通知</title>
<style>
/* ============ Theme ============ */
:root {
  --primary: #005BAC; --primary-light: #e8f0fa;
  --comp: #e85d04; --comp-light: #fff3eb;
  --holiday: #2d6a4f; --holiday-light: #edf7f2;
  --bg: #f0f2f5; --card: #fff; --text: #1a1a1a;
  --text2: #666; --text3: #999; --border: #e8e8e8;
  --shadow: 0 1px 3px rgba(0,0,0,.06);
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117; --card: #161b22; --text: #e6edf3;
    --text2: #8b949e; --text3: #6e7681; --border: #30363d;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --primary-light: #1a3050; --comp-light: #2a1a10; --holiday-light: #1a2a20;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;min-height:100vh;padding-bottom:calc(80px + var(--safe-bottom))}

/* ============ Header ============ */
.header{position:sticky;top:0;z-index:100;background:var(--primary);padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top, 0px));display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header .left{display:flex;align-items:center;gap:8px}
.header .logo{font-size:20px}
.header h1{font-size:17px;font-weight:600;color:#fff;letter-spacing:.5px}
.header .date{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.header .header-actions{display:flex;gap:4px}
.header .hdr-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ============ Pull to refresh ============ */
.pull-indicator{text-align:center;padding:0;color:var(--text3);font-size:13px;overflow:hidden;transition:max-height .3s;max-height:0}
.pull-indicator.show{max-height:44px;padding:12px}
.pull-indicator .spinner-sm{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ============ Stats ============ */
.stats-bar{display:flex;padding:12px 16px;gap:10px}
.stat-card{flex:1;background:var(--card);border-radius:var(--radius);padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-card .num{font-size:22px;font-weight:700}
.stat-card .num.comp{color:var(--comp)}
.stat-card .num.holiday{color:var(--holiday)}
.stat-card .label{font-size:10px;color:var(--text2);margin-top:2px}

/* ============ Tabs ============ */
.tabs-scroll{overflow-x:auto;white-space:nowrap;padding:0 16px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs-scroll::-webkit-scrollbar{display:none}
.tabs-inner{display:inline-flex;gap:6px}
.tab{padding:7px 14px;border-radius:18px;font-size:13px;font-weight:500;border:none;cursor:pointer;background:var(--card);color:var(--text2);box-shadow:var(--shadow);transition:all .2s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.tab.active.comp-tab{background:var(--comp);color:#fff}
.tab.active.holiday-tab{background:var(--holiday);color:#fff}

/* ============ Date group ============ */
.date-group{margin:0 16px 12px}
.date-group-label{font-size:12px;font-weight:600;color:var(--text3);padding:8px 0 4px;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.date-group-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ============ Cards ============ */
.list{padding:0 16px 8px}
.card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s;border-left:4px solid transparent;position:relative;overflow:hidden}
.card:active{transform:scale(.985);background:var(--card)}
.card.comp-card{border-left-color:var(--comp)}
.card.holiday-card{border-left-color:var(--holiday)}
.card .card-head{display:flex;align-items:flex-start;gap:8px;padding-right:24px}
.card .emoji{font-size:15px;flex-shrink:0;margin-top:1px}
.card .title{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card .meta{display:flex;align-items:center;gap:8px;margin-top:6px;font-size:11px;color:var(--text3);flex-wrap:wrap}
.card .meta .tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:500}
.card .meta .tag.comp-tag{background:var(--comp-light);color:var(--comp)}
.card .meta .tag.holiday-tag{background:var(--holiday-light);color:var(--holiday)}
.card .summary{font-size:12px;color:var(--text2);margin-top:4px;display:none;line-height:1.5}
.card.expanded .summary{display:block}
.card .arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text3);transition:transform .2s}
.card.expanded .arrow{transform:translateY(-50%) rotate(90deg)}
.card .detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card.expanded .detail{display:block}
.card .detail .row{margin-bottom:6px;font-size:12px;color:var(--text2)}
.card .detail .row span{color:var(--text3);margin-right:4px}
.card .detail .link-btn{display:inline-block;margin-top:4px;padding:7px 14px;background:var(--primary);color:#fff;border-radius:8px;font-size:12px;text-decoration:none;font-weight:500}
.card .detail .link-btn:active{opacity:.8}

/* ============ Search ============ */
.search-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;padding:16px;padding-top:calc(16px + env(safe-area-inset-top, 0px))}
.search-overlay.show{display:block}
.search-box{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:11px 14px;border-radius:12px;border:2px solid var(--border);font-size:14px;outline:none;background:var(--card);color:var(--text);transition:border-color .2s}
.search-box input:focus{border-color:var(--primary)}
.search-box .cancel{background:none;border:none;font-size:14px;color:var(--primary);cursor:pointer;white-space:nowrap;padding:8px}
.search-hint{text-align:center;padding:30px 0;color:var(--text3)}
.search-hint .icon{font-size:40px;margin-bottom:8px}
.search-empty{text-align:center;padding:40px 16px;color:var(--text3)}

/* ============ Empty ============ */
.empty-state{text-align:center;padding:40px 16px;color:var(--text3)}
.empty-state .icon{font-size:44px;margin-bottom:8px}

/* ============ Bottom nav ============ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);display:flex;border-top:1px solid var(--border);z-index:100;padding-bottom:var(--safe-bottom);box-shadow:0 -1px 4px rgba(0,0,0,.04)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 5px;font-size:10px;color:var(--text3);border:none;background:none;cursor:pointer;transition:color .2s}
.nav-item .nav-icon{font-size:20px;margin-bottom:1px}
.nav-item.active{color:var(--primary)}

/* ============ About page ============ */
.about-page{display:none;padding:20px 16px}
.about-page.show{display:block}
.about-card{background:var(--card);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow)}
.about-card .logo{font-size:52px;margin-bottom:10px}
.about-card h2{font-size:17px;margin-bottom:4px;color:var(--text)}
.about-card .ver{font-size:11px;color:var(--text3);margin-bottom:14px}
.about-card p{font-size:12px;color:var(--text2);line-height:1.8}
.about-card a{color:var(--primary)}
.dark-toggle{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;background:var(--bg);border:none;color:var(--text);font-size:13px;cursor:pointer;margin-top:12px}

/* ============ Toast ============ */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ============ Loading ============ */
.loading{text-align:center;padding:20px;color:var(--text3)}

/* ============ Active tab highlight scroller ============ */
.active-scroll{scroll-margin:8px}

/* ============ iOS safe area ============ */
@supports(padding:max(0px)){
  .header{padding-top:max(12px,env(safe-area-inset-top))}
  body{padding-bottom:max(80px,calc(80px + env(safe-area-inset-bottom)))}
}
</style>
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div class="left">
    <span class="logo">📬</span>
    <div>
      <h1>斛兵来信</h1>
      <span class="date" id="headerDate">加载中…</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="refreshData()" title="刷新">🔄</button>
    <button class="hdr-btn" onclick="toggleSearch()" title="搜索">🔍</button>
  </div>
</div>

<!-- 下拉刷新 -->
<div class="pull-indicator" id="pullIndicator"><span class="spinner-sm"></span> 刷新中…</div>

<!-- 统计 -->
<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="num comp" id="compCount">-</div><div class="label">🏆 竞赛通知</div></div>
  <div class="stat-card"><div class="num holiday" id="holidayCount">-</div><div class="label">📅 节假日通知</div></div>
  <div class="stat-card"><div class="num" id="updateDay" style="color:var(--primary)">-</div><div class="label">📆 更新于</div></div>
</div>

<!-- Tab 滚动条 -->
<div class="tabs-scroll" id="tabsArea">
  <div class="tabs-inner">
    <button class="tab active comp-tab" onclick="switchTab('competition','')">🏆 全部竞赛</button>
    <button class="tab comp-tab" data-sub="学科竞赛" onclick="switchTab('competition','学科竞赛')">🏅 学科竞赛</button>
    <button class="tab comp-tab" data-sub="创新创业" onclick="switchTab('competition','创新创业')">💡 创新创业</button>
    <button class="tab comp-tab" data-sub="课题申报" onclick="switchTab('competition','课题申报')">📋 课题申报</button>
    <button class="tab comp-tab" data-sub="讲座报告" onclick="switchTab('competition','讲座报告')">🎙️ 讲座报告</button>
    <button class="tab holiday-tab" onclick="switchTab('holiday','')">📅 全部节假日</button>
    <button class="tab holiday-tab" data-sub="放假通知" onclick="switchTab('holiday','放假通知')">🎉 放假通知</button>
    <button class="tab holiday-tab" data-sub="假期安排" onclick="switchTab('holiday','假期安排')">📆 假期安排</button>
    <button class="tab holiday-tab" data-sub="开学返校" onclick="switchTab('holiday','开学返校')">🏫 开学返校</button>
  </div>
</div>

<!-- 通知列表 -->
<div class="list" id="noticeList"></div>

<!-- 关于 -->
<div class="about-page" id="aboutPage">
  <div class="about-card">
    <div class="logo">📬</div>
    <h2>斛兵来信 v2.0</h2>
    <div class="ver">合工大通知监控系统</div>
    <p>
      🏫 来源：合肥工业大学新闻网<br>
      🏆 竞赛 · 节假日自动推送<br>
      📱 PushPlus 微信通知<br><br>
      深色模式 · 子分类筛选<br>
      周报统计 · 下拉刷新
    </p>
    <button class="dark-toggle" onclick="toggleDarkMode()">
      <span id="darkIcon">🌙</span> <span id="darkLabel">深色模式</span>
    </button>
    <p style="margin-top:10px">
      <a href="https://news.hfut.edu.cn/tzgg2.htm" target="_blank">🔗 访问官网</a>
    </p>
  </div>
</div>

<!-- 底部 -->
<div class="bottom-nav">
  <button class="nav-item active" onclick="showPage('home')"><span class="nav-icon">🏠</span>首页</button>
  <button class="nav-item" onclick="switchTab('competition','');showPage('home')"><span class="nav-icon">🏆</span>竞赛</button>
  <button class="nav-item" onclick="switchTab('holiday','');showPage('home')"><span class="nav-icon">📅</span>节假</button>
  <button class="nav-item" onclick="showPage('about')"><span class="nav-icon">⚙</span>关于</button>
</div>

<!-- 搜索遮罩 -->
<div class="search-overlay" id="searchOverlay">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索通知标题、标签…" oninput="doSearch()" autocomplete="off">
    <button class="cancel" onclick="toggleSearch()">取消</button>
  </div>
  <div id="searchArea">
    <div class="search-hint" id="searchHint"><div class="icon">🔍</div>输入关键词搜索</div>
    <div class="list" id="searchResults"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== State ====================
let allNotices = [], currentTab = 'competition', currentSub = '', currentPage = 'home';
let darkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;

// ==================== Dark mode ====================
function applyDark() {
  document.documentElement.style.setProperty('--bg', darkMode ? '#0d1117' : '#f0f2f5');
  document.documentElement.style.setProperty('--card', darkMode ? '#161b22' : '#fff');
  document.documentElement.style.setProperty('--text', darkMode ? '#e6edf3' : '#1a1a1a');
  document.documentElement.style.setProperty('--text2', darkMode ? '#8b949e' : '#666');
  document.documentElement.style.setProperty('--text3', darkMode ? '#6e7681' : '#999');
  document.documentElement.style.setProperty('--border', darkMode ? '#30363d' : '#e8e8e8');
  document.documentElement.style.setProperty('--shadow', darkMode ? '0 1px 3px rgba(0,0,0,.3)' : '0 1px 3px rgba(0,0,0,.06)');
  document.getElementById('darkIcon').textContent = darkMode ? '☀️' : '🌙';
  document.getElementById('darkLabel').textContent = darkMode ? '浅色模式' : '深色模式';
}
function toggleDarkMode() { darkMode = !darkMode; applyDark(); }
applyDark();

// ==================== Haptic ====================
function haptic(style='light') {
  try { navigator.vibrate(style==='medium'?15:8); } catch(e) {}
}

// ==================== Data loading ====================
async function loadData() {
  try {
    const resp = await fetch('data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    allNotices = (data.notices || []).filter(n => n.category === 'competition' || n.category === 'holiday');
    allNotices.sort((a,b) => b.date.localeCompare(a.date));
    document.getElementById('headerDate').textContent = '更新于 ' + (data.updated || '--');
  } catch(e) {
    console.warn('Load failed, using sample', e);
    allNotices = sampleData();
  }
  render();
}

function sampleData() {
  return [
    {title:"关于举办2026新域新质创新大赛校内选拔赛的通知",date:"2026-07-21",link:"#",category:"competition",sub_label:"学科竞赛",source_tab:"教学科研"},
    {title:"关于举办第二届全球校友创新创业大赛的通知",date:"2026-07-21",link:"#",category:"competition",sub_label:"创新创业",source_tab:"教学科研"},
    {title:"关于组织参加第十五届挑战杯创业计划竞赛的通知",date:"2026-07-13",link:"#",category:"competition",sub_label:"学科竞赛",source_tab:"其他通知"},
    {title:"关于2026年清明节放假安排的通知",date:"2026-04-01",link:"#",category:"holiday",sub_label:"放假通知",source_tab:"其他通知"},
    {title:"关于做好2026年暑期有关事项的通知",date:"2026-06-20",link:"#",category:"holiday",sub_label:"假期安排",source_tab:"其他通知"},
  ];
}

async function refreshData() {
  document.getElementById('pullIndicator').classList.add('show');
  haptic('medium');
  await loadData();
  setTimeout(() => {
    document.getElementById('pullIndicator').classList.remove('show');
    showToast('已刷新');
  }, 500);
}

// ==================== Render ====================
function render() {
  // Filter
  let filtered = allNotices.filter(n => n.category === currentTab);
  if (currentSub) filtered = filtered.filter(n => (n.sub_label||'') === currentSub);
  filtered.sort((a,b) => b.date.localeCompare(a.date));

  // Stats
  const compAll = allNotices.filter(n => n.category === 'competition');
  const holAll = allNotices.filter(n => n.category === 'holiday');
  document.getElementById('compCount').textContent = compAll.length;
  document.getElementById('holidayCount').textContent = holAll.length;
  const dates = allNotices.map(n => n.date).sort().reverse();
  document.getElementById('updateDay').textContent = dates[0] ? dates[0].slice(5) : '-';

  // Date grouping
  const groups = dateGroups(filtered);
  let html = '';

  if (filtered.length === 0) {
    html = `<div class="empty-state"><span class="icon">📭</span>暂无${currentTab==='competition'?'竞赛':'节假日'}通知</div>`;
  } else {
    for (const [label, items] of Object.entries(groups)) {
      html += `<div class="date-group"><div class="date-group-label">${label} (${items.length})</div>`;
      for (const n of items) {
        const sub = n.sub_label || '';
        const tagCls = n.category === 'competition' ? 'comp-tag' : 'holiday-tag';
        const cardCls = n.category === 'competition' ? 'comp-card' : 'holiday-card';
        const emoji = n.category === 'competition' ? '🏆' : '📅';
        const summary = n.summary || '';
        html += `<div class="card ${cardCls}" onclick="toggleCard(this)" id="c_${escAttr(n.link||'')}">
          <div class="card-head"><span class="emoji">${emoji}</span>
            <span class="title">${escHtml(n.title)}</span>
          </div>
          <div class="meta">
            <span>📆 ${n.date}</span>${sub ? `<span class="tag ${tagCls}">${sub}</span>` : ''}
            <span>${escHtml(n.source_tab||'')}</span>
          </div>
          ${summary ? `<div class="summary">📝 ${escHtml(summary).substring(0,100)}</div>` : ''}
          <span class="arrow">▶</span>
          <div class="detail">
            <div class="row"><span>📝</span> ${escHtml(n.title)}</div>
            <div class="row"><span>📅</span> 发布时间：${n.date}</div>
            <div class="row"><span>📂</span> 来源：${escHtml(n.source_tab||'未知')}</div>
            ${sub ? `<div class="row"><span>🏷️</span> 分类：${sub}</div>` : ''}
            ${summary ? `<div class="row"><span>📄</span> ${escHtml(summary).substring(0,200)}</div>` : ''}
            <a href="${escHtml(n.link)}" target="_blank" class="link-btn" onclick="event.stopPropagation();haptic()">🔗 查看官网原文 →</a>
          </div>
        </div>`;
      }
      html += '</div>';
    }
  }

  document.getElementById('noticeList').innerHTML = html;

  // Tab highlights
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => {
    const tCat = t.classList.contains('comp-tab') ? 'competition' : (t.classList.contains('holiday-tab') ? 'holiday' : '');
    const tSub = t.dataset.sub || '';
    if (tCat === currentTab && tSub === currentSub) t.classList.add('active');
  });
}

function dateGroups(notices) {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const yesterday = new Date(now - 864e5).toISOString().slice(0,10);
  const weekAgo = new Date(now - 7*864e5).toISOString().slice(0,10);
  const monthAgo = new Date(now - 30*864e5).toISOString().slice(0,10);

  const groups = { '📌 今天': [], '📌 昨天': [], '📌 本周': [], '📌 本月': [], '📌 更早': [] };
  for (const n of notices) {
    if (n.date === today) groups['📌 今天'].push(n);
    else if (n.date === yesterday) groups['📌 昨天'].push(n);
    else if (n.date > weekAgo) groups['📌 本周'].push(n);
    else if (n.date > monthAgo) groups['📌 本月'].push(n);
    else groups['📌 更早'].push(n);
  }
  // Remove empty groups
  return Object.fromEntries(Object.entries(groups).filter(([_,v]) => v.length > 0));
}

// ==================== Tab / Page ====================
function switchTab(cat, sub) {
  currentTab = cat; currentSub = sub;
  render(); showPage('home'); haptic();
}

function toggleCard(card) { card.classList.toggle('expanded'); haptic(); }

function showPage(page) {
  currentPage = page;
  const home = page === 'home';
  ['noticeList','statsBar','tabsArea'].forEach(id => document.getElementById(id).style.display = home ? '' : 'none');
  document.getElementById('aboutPage').classList.toggle('show', page === 'about');
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    const idxMap = {0:'home',1:'home',2:'home',3:'about'};
    el.classList.toggle('active', idxMap[i] === page);
  });
}

// ==================== Search ====================
function toggleSearch() {
  const ov = document.getElementById('searchOverlay');
  const show = ov.classList.toggle('show');
  if (show) {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchResults').innerHTML = '';
    document.getElementById('searchHint').style.display = '';
    setTimeout(() => document.getElementById('searchInput').focus(), 100);
  }
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const hint = document.getElementById('searchHint');
  const results = document.getElementById('searchResults');
  if (!q) { results.innerHTML = ''; hint.style.display = ''; return; }
  hint.style.display = 'none';

  // Local search: title + sub_label + source_tab
  const matched = allNotices.filter(n =>
    n.title.toLowerCase().includes(q) ||
    (n.sub_label||'').includes(q) ||
    (n.source_tab||'').toLowerCase().includes(q) ||
    (n.summary||'').toLowerCase().includes(q)
  );

  if (!matched.length) {
    results.innerHTML = `<div class="search-empty"><div class="icon">🔍</div>未找到"${escHtml(q)}"</div>`;
    return;
  }

  results.innerHTML = matched.map(n => {
    const sub = n.sub_label || '';
    const tagCls = n.category === 'competition' ? 'comp-tag' : 'holiday-tag';
    const cardCls = n.category === 'competition' ? 'comp-card' : 'holiday-card';
    const emoji = n.category === 'competition' ? '🏆' : '📅';
    return `<div class="card ${cardCls}" onclick="this.classList.toggle('expanded')">
      <div class="card-head"><span class="emoji">${emoji}</span><span class="title">${escHtml(n.title)}</span></div>
      <div class="meta">
        <span>📆 ${n.date}</span>${sub?`<span class="tag ${tagCls}">${sub}</span>`:''}
        <span>${escHtml(n.source_tab||'')}</span>
      </div>
      <span class="arrow">▶</span>
      <div class="detail">
        <div class="row"><span>📝</span> ${escHtml(n.title)}</div>
        <div class="row"><span>📅</span> ${n.date}</div>
        ${n.summary?`<div class="row"><span>📄</span> ${escHtml(n.summary).substring(0,200)}</div>`:''}
        <a href="${escHtml(n.link)}" target="_blank" class="link-btn" onclick="event.stopPropagation()">🔗 查看原文 →</a>
      </div>
    </div>`;
  }).join('');
}

// ==================== Utils ====================
function escHtml(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function escAttr(s) { return (s||'').replace(/[^a-zA-Z0-9]/g,'_'); }
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ==================== PWA ====================
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// ==================== Init ====================
loadData(); showPage('home');
</script>
