name: Notice Monitor
  on:
    schedule:
      - cron: "0 */2 * * *"
    workflow_dispatch:
  jobs:
    scrape:
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - run: pip install requests beautifulsoup4 lxml
        - run: python run_cloud.py
          env:
            PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        - run: |
            git config user.name "HFUT Bot"
            git config user.email "bot@hfut.local"
            git add docs/ || true
            git diff --cached --quiet || git commit -m "update" || true
            git push || true
